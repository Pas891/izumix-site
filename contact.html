<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8"/>
    <title>Contact | IZUMIX</title>
    <meta content="Contact" property="og:title"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    
    <link crossorigin="anonymous" href="https://cdn.prod.website-files.com/69d0e4f9bfb89085d7018ef2/css/izumix-labs.webflow.shared.bdc4784c1.css" integrity="sha384-vcR4TBI6EFWJt53/1Ckwls+pgkj5pkoG33JUvwf29wLkqQ4kghPlLrd28r/YOzs/" rel="stylesheet" type="text/css"/>
    
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="anonymous" href="https://fonts.gstatic.com" rel="preconnect"/>
    <script src="https://ajax.googleapis.com/ajax/libs/webfont/1.6.26/webfont.js" type="text/javascript"></script>
    <script type="text/javascript">
        WebFont.load({ google: { families: ["Montserrat:100,200,300,400,500,600,700,800,900"] }});
    </script>
    
    <style>
        .w-webflow-badge { display: none !important; visibility: hidden !important; }
        /* Небольшая правка для красоты формы */
        .contact-form { padding: 20px; border-radius: 8px; background: #f9f9f9; }
    </style>
</head>
<body>
    <div class="navigation w-nav" role="banner">
        <div class="navigation-wrap">
            <a class="logo-link w-nav-brand" href="/">IZUMIX</a>
            <div class="menu">
                <div class="menu-button w-nav-button">
                    <img alt="" class="menu-icon" src="https://cdn.prod.website-files.com/69d0e4f9bfb89085d7018f52_menu-icon.png" width="22"/>
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="container">
            <div class="w-layout-grid contact-form-grid">
                <div class="contact-form-wrap">
                    <div class="contact-form w-form">
                        
                        <form action="https://formspree.io/f/mpqobkav" method="POST" class="get-in-touch-form" id="email-form">
                            <label for="name">Имя</label>
                            <input class="text-field cc-contact-field w-input" name="name" id="Name" maxlength="256" placeholder="Введите ваше имя" type="text" required/>
                            
                            <label for="Email">Электронная почта</label>
                            <input class="text-field cc-contact-field w-input" name="email" id="Email" maxlength="256" placeholder="vash-email@mail.ru" type="email" required/>
                            
                            <label for="Message">Сообщение</label>
                            <textarea class="text-field cc-textarea cc-contact-field w-input" name="message" id="Message" maxlength="5000" placeholder="Расскажите о вашем проекте..."></textarea>
                            
                            <input class="primary-button w-button" type="submit" value="Отправить запрос"/>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="section cc-cta">
        <div class="container">
            <div class="cta-wrap">
                <div>
                    <div class="cta-text">
                        <div class="heading-jumbo-small">Переводим ваш бизнес на новый уровень.</div>
                        <div class="paragraph-bigger cc-bigger-light">
                            Разрабатываем и внедряем решения, которые делают компанию сильнее, процессы прозрачнее, а работу эффективнее. 
                        </div>
                    </div>
                    <a class="primary-button cc-jumbo-button w-inline-block" href="mailto:izumixlabs@gmail.com">
                        <div>написать нам</div>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <div class="container">
            <div class="footer-wrap">
                Tel: +7 (771) 336 69-17.<br/>
                Mail: izumixlabs@gmail.com<br/>
                Instagram: izumix_Labs<br/>
            </div>
        </div>
    </div>

    <script crossorigin="anonymous" src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js" type="text/javascript"></script>
</body>
</html>
